
version: '3'
services:

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db

  dashboard:
    image: python:3.11
    working_dir: /app
    volumes:
      - .:/app
    command: streamlit run dashboard/app.py
    ports:
      - "8501:8501"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: clinical
    ports:
      - "5432:5432"
